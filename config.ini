# Path to UDK compiler (only needed for compile)
UDK=C:\UDK\Custom\Binaries\Win32\UDK.com

# Compiled .u file (UDK output, only needed for compile)
SRC=C:\UDK\Custom\UDKGame\Script\Multiplayer.u

# Server script filename
BRIDGE_SCRIPT=server.py

# Outlast root directory (e.g. F:\SteamLibrary\steamapps\common\Outlast)
